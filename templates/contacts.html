<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contacts</title>
    <link rel="stylesheet" href="/static/style/style.css">
    <script src="/static/appjs/app.js"></script>
</head>

<body>

<div class="container">

    <h2>Contacts</h2>

    {% if contacts|length == 0 %}

    <p>No contact(s) found.</p>

    {% else %}

    <table>

        <tr>
            <th>Full Name</th>
            <th>Email</th>
            <th>Action</th>
        </tr>

        {% for contact in contacts %}

        <tr>

            <td>{{contact.fullname}}</td>

            <td>{{contact.email}}</td>

            <td>

                <button onclick="showContactWarning()">
                    View
                </button>

            </td>

        </tr>

        {% endfor %}

    </table>

    {% endif %}

</div>

<script>
function showContactWarning() {
    alert("To unlink a contact from clients, visit the specific client page and use the Unlink button in the Contacts tab.");
}
</script>

</body>
</html>
